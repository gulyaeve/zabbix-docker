global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "cctv"
    metrics_path: /cctv/metrics
    static_configs:
      - targets: ["cctv.itmoscow"]
    tls_config:
      ca_file: /etc/ssl/cctv.itmoscow.crt

  - job_name: "mediamtx"
    metrics_path: /metrics
    static_configs:
      - targets: ['cctv.itmoscow:9998']